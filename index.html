<style>
  :root{
    --bg:#140E26; --card:rgba(255,255,255,.07); --soft:rgba(255,255,255,.04); --line:rgba(255,255,255,.13); --ink:#F4EFFF; --mut:#BCAFDC; --mut2:#897CB0;
    --coral:#FF6B8A; --peach:#FF9E5E; --sun:#FFC23D; --mint:#2FCB9B; --sky:#4FB0FF; --lav:#9B82FF; --pink:#FF7FB0;
    --sh:0 6px 18px -8px rgba(0,0,0,.5); --sh2:0 12px 30px -10px rgba(0,0,0,.62); --track:rgba(255,255,255,.14);
    --f:"Segoe UI",-apple-system,system-ui,Roboto,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:var(--f);color:var(--ink);background:var(--bg);min-height:100vh;line-height:1.45;
    background-image:radial-gradient(70% 40% at 90% -5%,rgba(155,130,255,.5) 0,transparent 50%),radial-gradient(60% 35% at 0% 3%,rgba(255,127,176,.4) 0,transparent 50%),radial-gradient(80% 45% at 50% 108%,rgba(79,176,255,.4) 0,transparent 55%);
    background-attachment:fixed;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  #app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;padding:max(14px,env(safe-area-inset-top)) 16px calc(24px + env(safe-area-inset-bottom))}
  #app.flash{animation:flash .4s} @keyframes flash{0%,100%{filter:none}50%{filter:brightness(1.15)}}
  #app.shake{animation:appshake .4s} @keyframes appshake{0%,100%{transform:none}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  .screen{animation:rise .3s cubic-bezier(.2,.7,.2,1)}
  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  @keyframes pop{0%{transform:scale(0)}80%{transform:scale(1.1)}100%{transform:scale(1)}}
  @keyframes flip{0%{transform:rotateY(90deg);opacity:0}100%{transform:rotateY(0);opacity:1}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .logo{font-weight:900;font-size:28px;letter-spacing:-.03em;font-style:italic;background:linear-gradient(95deg,var(--coral),var(--peach) 55%,var(--sun));-webkit-background-clip:text;background-clip:text;color:transparent}
  .chips{display:flex;gap:6px;align-items:center}
  .chip{display:flex;align-items:center;gap:4px;background:var(--card);border:1px solid var(--line);padding:6px 9px;border-radius:999px;font-weight:800;font-size:13px;box-shadow:var(--sh)}
  .chip.fl{color:#F08A2E} .chip.co{color:var(--mint)}
  .iconbtn{background:var(--card);border:1px solid var(--line);color:var(--ink);width:34px;height:34px;border-radius:10px;font-size:15px;cursor:pointer;box-shadow:var(--sh)}
  .ey{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut2);font-weight:800}
  .muted{color:var(--mut)} h1,h2,h3{margin:0;letter-spacing:-.02em}

  .scoreboard{display:flex;gap:7px;margin:0 0 13px}
  .sb{flex:1;background:var(--card);border:1px solid var(--line);border-radius:15px;padding:9px 3px;text-align:center;box-shadow:var(--sh);animation:pop .4s cubic-bezier(.2,1.3,.4,1)}
  .sb .n{font-size:20px;font-weight:900;line-height:1;font-variant-numeric:tabular-nums}
  .sb .t{font-size:9px;color:var(--mut);margin-top:3px}
  .sb:nth-child(1) .n{color:var(--sky)} .sb:nth-child(2) .n{color:var(--mint)} .sb:nth-child(3) .n{color:var(--coral)} .sb:nth-child(4) .n{color:var(--sun)}
  .learnbar{margin:0 0 13px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 13px;box-shadow:var(--sh)}
  .lbtop{display:flex;justify-content:space-between;font-size:12.5px;font-weight:700;margin-bottom:6px} .lbtop b{color:var(--lav)}
  .lbnote{font-size:10.5px;color:var(--mut2);margin-top:7px;line-height:1.4}

  .hero{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:22px;padding:15px;box-shadow:var(--sh2);position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;inset:0;background:linear-gradient(120deg,rgba(255,127,176,.08),rgba(79,176,255,.06));pointer-events:none}
  .masc{width:74px;height:74px;border-radius:22px;flex:none;display:grid;place-items:center;font-size:42px;background:linear-gradient(135deg,#FF9E5E,#FF6B8A);border:1px solid var(--line);animation:bob 3s ease-in-out infinite;z-index:1}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  .hero .hi{z-index:1;flex:1}
  .hero .lvlrow{display:flex;align-items:center;gap:8px;font-weight:900;font-size:18px}
  .hero .tag{font-size:11px;font-weight:800;color:#fff;background:linear-gradient(90deg,var(--coral),var(--peach));padding:2px 8px;border-radius:999px}
  .hero .say{font-size:13px;color:var(--mut);margin-top:3px}
  .xpbar{height:9px;border-radius:999px;background:var(--track);margin-top:8px;overflow:hidden}
  .xpbar>i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--coral),var(--peach));width:0;transition:width .8s cubic-bezier(.2,.7,.2,1)}

  .quest{margin-top:13px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 15px;display:flex;align-items:center;gap:12px;box-shadow:var(--sh)}
  .quest .ttl{font-weight:800;font-size:14px} .quest .sub{font-size:12px;color:var(--mut)}
  .qbar{height:7px;border-radius:999px;background:var(--track);margin-top:7px;overflow:hidden}
  .qbar>i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--mint),var(--sky))}
  .quest .qn{font-weight:900;font-size:15px;font-variant-numeric:tabular-nums}

  .pus{display:flex;gap:8px;margin-top:12px}
  .pu{flex:1;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:9px;text-align:center;font-size:12px;color:var(--mut);box-shadow:var(--sh)}
  .pu .e{font-size:18px} .pu b{display:block;color:var(--ink);font-size:15px;margin-top:1px}

  .cta{width:100%;border:0;border-radius:18px;padding:18px;margin-top:15px;cursor:pointer;font-family:inherit;font-weight:900;font-size:18px;color:#fff;letter-spacing:-.01em;background:linear-gradient(95deg,var(--coral),var(--peach));box-shadow:0 12px 26px -10px rgba(255,107,138,.6);display:flex;align-items:center;justify-content:center;gap:9px;transition:transform .12s}
  .cta:active{transform:scale(.98)}
  .cta.alt{background:linear-gradient(95deg,var(--mint),var(--sky));box-shadow:0 12px 26px -10px rgba(47,203,155,.5)}
  .cta.ghost{background:var(--card);border:1px solid var(--line);color:var(--ink);box-shadow:var(--sh);font-size:15px;padding:14px}
  .cta .pill{background:rgba(255,255,255,.25);padding:3px 10px;border-radius:999px;font-size:13px}

  .sect{margin-top:20px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
  .tile{border:1px solid var(--line);border-radius:16px;padding:14px;cursor:pointer;text-align:left;font-family:inherit;color:var(--ink);background:var(--card);box-shadow:var(--sh);transition:transform .12s}
  .tile:active{transform:scale(.97)}
  .tile .ic{font-size:23px} .tile .t{font-weight:900;margin-top:7px;font-size:15px} .tile .d{font-size:11.5px;color:var(--mut);margin-top:1px;line-height:1.35}
  .tile.locked{opacity:.5}

  .zrow{display:flex;align-items:center;gap:11px;margin:9px 0;cursor:pointer;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 12px;box-shadow:var(--sh)}
  .zrow .ze{font-size:24px;width:32px;text-align:center} .zrow .zn{flex:1} .zrow .znm{font-weight:800;font-size:14px} .zrow .zd{font-size:11px;color:var(--mut)}
  .zbar{height:8px;border-radius:999px;background:var(--track);overflow:hidden;margin-top:5px} .zbar>i{display:block;height:100%;border-radius:999px}
  .zrow .zp{font-size:12px;color:var(--mut);width:38px;text-align:right;font-variant-numeric:tabular-nums}

  .qtop{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .x{background:var(--card);border:1px solid var(--line);color:var(--ink);width:38px;height:38px;border-radius:11px;font-size:18px;cursor:pointer;flex:none;box-shadow:var(--sh)}
  .pbar{flex:1;height:9px;border-radius:999px;background:var(--track);overflow:hidden}
  .pbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--coral),var(--peach));width:0;transition:width .35s}
  .combo{font-weight:900;font-size:14px;color:var(--peach);opacity:0;transition:.2s} .combo.on{opacity:1;animation:pop .3s}

  .badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .bdg{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:800;padding:4px 9px;border-radius:999px;border:1px solid;cursor:pointer;background:var(--card)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--sh2);padding:20px 18px;position:relative;overflow:hidden}
  .card::before{content:"";position:absolute;top:0;left:0;right:0;height:5px;background:var(--accent,var(--coral))}
  .word{font-size:36px;font-weight:900;letter-spacing:-.01em;text-align:center;margin:4px 0 2px;animation:flip .4s}
  .pos{text-align:center;color:var(--mut2);font-style:italic;font-size:14px;margin-bottom:14px}
  .prompt{font-size:14px;color:var(--mut);text-align:center;margin-bottom:14px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
  .blankq{font-size:19px;font-weight:700;line-height:1.45;margin:2px 4px 18px;text-align:center}
  .opts{display:flex;flex-direction:column;gap:9px}

const GOAL=15, DAYMS=86400000, INTERVAL=[0,1,2,4,8,16];

function today(){return new Date().toISOString().slice(0,10)}
function todayN(){const d=new Date();return Math.floor((d-new Date(d.getFullYear(),0,0))/DAYMS)+d.getFullYear()*366}
function freshState(){return{cards:{},lastFmt:{},seenBadges:[],streak:0,best:0,last:null,xp:0,goalDate:null,goalCount:0,badges:[],hist:{},totAns:0,totOk:0,trapOk:0,trapWordOk:{},maxRun:0,sound:true,skin:0,name:"",avatar:"🦊",pu:{fifty:2,dbl:2,freeze:1}}}

function cs(id){return S.cards[id]||(S.cards[id]={box:0,due:0,seen:false,ok:0,no:0})}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]]}return a}
function word(id){return WORDS.find(w=>w.id===id)}
function dueIds(){return WORDS.filter(w=>{const t=S.cards[w.id];return t&&t.seen&&t.due<=todayN()}).map(w=>w.id)}
function newIds(){return WORDS.filter(w=>!(S.cards[w.id]&&S.cards[w.id].seen)).map(w=>w.id)}
function wrongIds(){return WORDS.filter(w=>{const t=S.cards[w.id];return t&&t.seen&&t.box<=1&&t.no>0}).map(w=>w.id)}
function rightOf(ws){return ws.filter(w=>S.cards[w.id]&&S.cards[w.id].ok>0).length}
function buildBurst(){let due=shuffle(dueIds()),nw=shuffle(newIds()),q=due.slice(0,9);for(const id of nw){if(q.length>=GOAL)break;q.push(id)}for(const id of due.slice(9)){if(q.length>=GOAL)break;q.push(id)}if(!q.length)q=shuffle(WORDS.map(w=>w.id)).slice(0,10);return shuffle(q)}
function levelOf(xp){return 1+Math.floor(xp/150)}
function rollGoal(){const t=today();if(S.goalDate!==t){S.goalDate=t;S.goalCount=0}}
function addXP(n){const b=levelOf(S.xp);S.xp+=n;const a=levelOf(S.xp);if(a>b){const k=['fifty','dbl','freeze'][a%3];S.pu[k]=(S.pu[k]||0)+1;milestone("🎉","LEVEL "+a+"!","+1 "+(k==='fifty'?'50:50':k==='dbl'?'2× XP':'freeze'))}}

function checkStreakLoad(){const t=today();if(S.last&&S.last!==t){const y=new Date(Date.now()-DAYMS).toISOString().slice(0,10);if(S.last!==y){if((S.pu.freeze||0)>0&&S.last===new Date(Date.now()-2*DAYMS).toISOString().slice(0,10)){S.pu.freeze--;S.last=y;setTimeout(()=>toast("🥶 streak freeze used — saved!"),600)}else S.streak=0;save()}}}

let AC;function beep(f,d,t,v){if(!S.sound)return;try{AC=AC||new(window.AudioContext||window.webkitAudioContext)();const o=AC.createOscillator(),g=AC.createGain();o.type=t||'sine';o.frequency.value=f;o.connect(g);g.connect(AC.destination);g.gain.setValueAtTime(.0001,AC.currentTime);g.gain.exponentialRampToValueAtTime(v||.18,AC.currentTime+.01);g.gain.exponentialRampToValueAtTime(.0001,AC.currentTime+d);o.start();o.stop(AC.currentTime+d)}catch(e){}}
function comboChime(run){const base=560+Math.min(run,8)*70;beep(base,.1);setTimeout(()=>beep(base*1.5,.13),70)}

const cf=document.getElementById('cf'),cx=cf.getContext('2d');let parts=[];const COLS=['#FF6B8A','#FF9E5E','#FFC23D','#2FCB9B','#4FB0FF','#9B82FF','#FF7FB0'];
function confettiBurst(n){if(matchMedia('(prefers-reduced-motion:reduce)').matches)return;cf.width=innerWidth;cf.height=innerHeight;const was=parts.length;for(let i=0;i<n;i++)parts.push({x:innerWidth/2+(Math.random()-.5)*120,y:innerHeight*.34,vx:(Math.random()-.5)*11,vy:Math.random()*-13-3,g:.36,c:COLS[i%COLS.length],s:5+Math.random()*7,r:Math.random()*6});if(was===0)anim()}
function anim(){cx.clearRect(0,0,cf.width,cf.height);parts=parts.filter(p=>p.y<cf.height+30);parts.forEach(p=>{p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.r+=.2;cx.save();cx.translate(p.x,p.y);cx.rotate(p.r);cx.fillStyle=p.c;cx.fillRect(-p.s/2,-p.s/2,p.s,p.s);cx.restore()});if(parts.length)requestAnimationFrame(anim);else cx.clearRect(0,0,cf.width,cf.height)}

function celebrate(run){comboChime(run);if(run>=10){milestone("🔥","10 IN A ROW!","you're on fire 🔥");return}if(run>=5){confettiBurst(60);flashScreen();return}if(run>=3)confettiBurst(34);else confettiBurst(16)}

function applyResult(w,correct){const st=cs(w.id);st.seen=true;S.totAns++;let g;if(correct){st.ok++;st.box=Math.min(5,st.box+1);st.due=todayN()+INTERVAL[st.box];S.totOk++;Q.ok++;Q.run++;if(Q.run>S.maxRun)S.maxRun=Q.run;if(w.tags&&w.tags.length)S.trapOk++;const mult=1+Math.min(Math.floor(Q.run/3),2),base=RANK[w.rank].xp,bonus=(w.tags?w.tags.length*5:0);g=Math.round((base+bonus)*mult*(Q.dbl?2:1));celebrate(Q.run)}else{st.no++;st.box=1;st.due=todayN();Q.run=0;g=2;sBad()}Q.dbl=false;addXP(g);rollGoal();S.goalCount++;logDay(correct);save();checkBadges();return g}

function renderFlip(){const w=Q.w;const clue=blankWord(w.sent,w.w);$.innerHTML=head()+`<div class="card" style="--accent:${RANK[w.rank].c}"><div class="prompt">⌨️ type the word from its meaning</div><div class="rdef" style="text-align:center;font-size:17px">${w.def}</div><div class="sent" style="text-align:center;margin-top:8px">💬 clue: ${clue}</div><div class="mask" id="mask"></div><input class="typein" id="fi" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false"></div><button class="cta alt" onclick="submitFlip()">check ✓</button><button class="cta ghost" onclick="flipGiveUp()" style="margin-top:8px">👎 don't know — show me</button><div id="rev"></div></div>`;setTimeout(()=>{const el=document.getElementById('fi');if(el){el.value=w.w[0];renderMask();el.addEventListener('input',renderMask);el.addEventListener('keydown',e=>{if(e.key==='Enter')submitFlip()});el.focus();try{el.setSelectionRange(9,9)}catch(e){}}},120)}

function findStem(sent,word){const s=sent.toLowerCase(),st=word.slice(0,Math.max(4,word.length-2)).toLowerCase();let i=s.indexOf(st);if(i<0)return null;let j=i;while(j<sent.length&&/[a-z]/i.test(sent[j]))j++;return[i,j]}

function findTile(sc,letter){for(let i=0;i<sc.letters.length;i++){if(sc.letters[i]===letter&&!sc.used.includes(i))return i}return -1}

 let t0=findTile(sc,w.w[0]);if(t0>=0){sc.slots[0]=t0;sc.used.push(t0);sc.locked.push(0)}
 if(w.w.length>=4){const cand=[];for(let j=1;j<w.w.length;j++)cand.push(j);const j=cand[Math.random()*cand.length|0];const tj=findTile(sc,w.w[j]);if(tj>=0){sc.slots[j]=tj;sc.used.push(tj);sc.locked.push(j)}}
 $.innerHTML=head()+`<div class="card" style="--accent:${RANK[w.rank].c}"><div class="prompt">🔡 unscramble the word</div><div class="rdef" style="text-align:center;font-size:16px">${w.def}</div><div class="slots" id="slots"></div><div class="tiles" id="tiles"></div><div class="hint">a couple of letters are given (locked) · <b style="color:var(--coral)">red</b> = wrong spot · tap a placed letter to take it back</div></div><button class="cta ghost" onclick="scrGiveUp()">👎 don't know — show me</button><div id="rev"></div></div>`;renderScr()}

let M=null;function startMatch(){const pool=shuffle(WORDS).slice(0,4);M={pool,left:pool.map(w=>w.w),right:shuffle(pool.map(w=>w.def)),sel:null,done:0};match()}
function match(){const L=M.left.map((t,i)=>`<button class="mitem" id="L${i}" onclick="msel(${i})"><b>${t}</b></button>`).join(''),R=M.right.map((t,i)=>`<button class="mitem" id="R${i}" onclick="mhit(${i})">${t}</button>`).join('');$.innerHTML=topbar()+`<div class="screen"><div class="qtop"><button class="x" onclick="home()">✕</button><div class="pbar"><i style="width:${M.done/M.pool.length*100}%"></i></div></div><div class="badges"><span class="bdg" style="color:var(--sky);border-color:#4FB0FF66">🔗 match the word to its meaning</span></div><div class="mcols"><div class="mcol">${L}</div><div class="mcol">${R}</div></div></div>`}
function msel(i){if(document.getElementById('L'+i).classList.contains('done'))return;sTap();document.querySelectorAll('.mcol .mitem').forEach(e=>e.classList.remove('sel'));M.sel=i;document.getElementById('L'+i).classList.add('sel')}
function mhit(j){if(M.sel===null||document.getElementById('R'+j).classList.contains('done'))return;const li=M.sel,lw=M.pool.find(w=>w.w===M.left[li]),correct=M.left[li]===M.pool.find(w=>w.def===M.right[j]).w;if(correct){document.getElementById('L'+li).classList.add('done');document.getElementById('R'+j).classList.add('done');M.done++;M.sel=null;trapGrade(lw,true,8);if(M.done>=M.pool.length)setTimeout(()=>endMini('match-up',M.done,M.pool.length),500)}else{const r=document.getElementById('R'+j);r.classList.add('bad');S.totAns++;sBad();save();setTimeout(()=>r.classList.remove('bad'),400)}}
let F=null;function startFake(){const reals=shuffle(WORDS).slice(0,5).map(w=>({t:w.w,real:true,d:w.def})),fakes=shuffle(FAKES).slice(0,4).map(t=>({t,real:false}));F={q:shuffle([...reals,...fakes]),i:0,ok:0};fake()}
function fake(){if(F.i>=F.q.length)return endMini('real or fake',F.ok,F.q.length);const c=F.q[F.i];$.innerHTML=topbar()+`<div class="screen"><div class="qtop"><button class="x" onclick="home()">✕</button><div class="pbar"><i style="width:${F.i/F.q.length*100}%"></i></div></div><div class="badges"><span class="bdg" style="color:var(--coral);border-color:#FF6B8A66">🃏 real GRE word, or made-up?</span></div><div class="stmt">${c.t}</div><div class="hbtns"><button class="hbtn real" onclick="fpick(true)">✓ real</button><button class="hbtn fake" onclick="fpick(false)">🃏 fake</button></div><div id="rev"></div></div>`}
function fpick(v){const c=F.q[F.i],ok=v===c.real;S.totAns++;logDay(ok);if(ok){F.ok++;S.totOk++;addXP(8);celebrate(2)}else sBad();S.goalCount++;rollGoal();save();document.querySelectorAll('.hbtn').forEach(b=>b.setAttribute('disabled',''));document.getElementById('rev').innerHTML=`<div class="reveal ${ok?'good':'bad'}"><div class="vtag">${ok?'😎 nailed it':'😵 gotcha'}</div><div class="rdef" style="margin-top:6px">${c.real?`<b>${c.t}</b> is real — ${c.d}`:`<b>${c.t}</b> is totally made up 😈`}</div><button class="cta" style="margin-top:12px" onclick="F.i++;fake()">${F.i+1>=F.q.length?'finish':'next'}</button></div>`}
let SV=null;function startSurvival(){SV={pool:shuffle(WORDS.map(w=>w.id)),i:0,score:0};surv()}
function surv(){if(SV.i>=SV.pool.length)return endMini('survival',SV.score,SV.score);const w=word(SV.pool[SV.i]);SV.cur=genQ(w,'define');$.innerHTML=topbar()+`<div class="screen"><div class="qtop"><button class="x" onclick="home()">✕</button><div class="pbar"><i style="width:100%;background:linear-gradient(90deg,var(--lav),var(--pink))"></i></div><div class="combo on" style="color:var(--lav)">💀 ${SV.score}</div></div><div class="badges">${badgeHTML(w)}</div><div class="card" style="--accent:${RANK[w.rank].c}"><div class="word">${w.w}</div><div class="pos">${w.pos}</div></div><div class="prompt">what's the vibe? · one wrong = over 💀</div><div class="opts">${SV.cur.opts.map((t,i)=>`<button class="opt" id="o${i}" onclick="svpick(${i})"><span class="k">${'ABCD'[i]}</span><span>${t}</span></button>`).join('')}</div></div>`}
function svpick(i){const w=word(SV.pool[SV.i]),ok=i===SV.cur.ci;document.querySelectorAll('.opt').forEach((el,idx)=>{el.setAttribute('disabled','');if(idx===SV.cur.ci)el.classList.add('correct');else if(idx===i)el.classList.add('wrong')});const st=cs(w.id);st.seen=true;S.totAns++;logDay(ok);S.goalCount++;rollGoal();if(ok){st.ok++;st.box=Math.min(5,st.box+1);st.due=todayN()+INTERVAL[st.box];S.totOk++;SV.score++;addXP(8);save();celebrate(SV.score);setTimeout(()=>{SV.i++;surv()},600)}else{st.no++;st.box=1;st.due=todayN();save();sBad();setTimeout(()=>{$.innerHTML=topbar()+`<div class="screen res"><div class="big">${SV.score>=10?'🐐':SV.score>=5?'🔥':'💀'}</div><h2>survived ${SV.score}</h2><div class="muted">${SV.score>=10?'absolute goat':SV.score>=5?'respectable':'we go again'} 🔁</div><div class="reveal bad" style="text-align:left"><div class="vtag">😵 the word that got you</div><div class="rdef"><b>${w.w}</b> — ${w.def}</div>${w.hook?`<div class="hook"><span class="he">💡</span><div><b>trick:</b> ${w.hook}</div></div>`:''}</div><button class="cta" onclick="startSurvival()">run it back 🔁</button><button class="cta ghost" onclick="home()">home</button></div>`},850)}}

function calHTML(){const y=calMonth.getFullYear(),mo=calMonth.getMonth();
 const start=new Date(y,mo,1).getDay(),days=new Date(y,mo+1,0).getDate();
 const MON=["January","February","March","April","May","June","July","August","September","October","November","December"];
 const todayStr=today();const keys=Object.keys(S.hist).sort();const firstActive=keys.length?keys[0]:todayStr;

 const chips=SH.chips.map(ci=>`<button class="shchip ${SH.placed.includes(ci)?'used':''}" onclick="shadePlace(${ci})">${L.order[ci].w}</button>`).join('');

/* ===== Pick-the-2 · GRE Sentence Equivalence ===== */
const SE=[
 {s:"Despite the glowing reviews, the critic found the novel utterly ____, offering nothing readers hadn't seen before.",pair:["prosaic","pedestrian"],decoys:["innovative","profound","verbose","cryptic"],why:"prosaic and pedestrian both mean dull and unoriginal. innovative/profound are the opposite, and verbose/cryptic don't fit the meaning."},
 {s:"The committee voted to ____ the official for leaking confidential documents to the press.",pair:["censure","rebuke"],decoys:["exonerate","vindicate","promote","interrogate"],why:"censure and rebuke both mean to formally criticize. exonerate/vindicate form a tempting pair — but they mean the opposite (to clear of blame)."},
 {s:"Far from being ____, her explanation was so clear that even total beginners grasped it at once.",pair:["abstruse","cryptic"],decoys:["lucid","pellucid","verbose","succinct"],why:"abstruse and cryptic both mean hard to understand. lucid/pellucid pair up but mean 'clear' — which would contradict the sentence."},
 {s:"Heavy rain finally ____ the wildfire that had raged across the hills for days.",pair:["doused","extinguished"],decoys:["ignited","kindled","surveyed","escalated"],why:"doused and extinguished both mean to put out. ignited/kindled are the trap pair — they mean to START a fire."},
 {s:"Her ____ enthusiasm was infectious; within minutes the whole team had caught her excitement.",pair:["ebullient","exuberant"],decoys:["lethargic","morose","tepid","candid"],why:"ebullient and exuberant both mean bubbling with energy. lethargic/morose/tepid are the opposite."},
 {s:"The fresh evidence served only to ____ the witness's account, confirming every last detail.",pair:["corroborate","substantiate"],decoys:["refute","debunk","fabricate","summarize"],why:"corroborate and substantiate both mean to confirm with evidence. refute/debunk pair up but mean to disprove."},
 {s:"His argument was so ____ that not a single critic in the room could find a flaw in it.",pair:["cogent","compelling"],decoys:["specious","spurious","tenuous","verbose"],why:"cogent and compelling both mean convincing. specious/spurious mean 'falsely convincing', and tenuous means weak — all wrong here."},
 {s:"The professor's ____ lectures, delivered in a flat monotone, left students fighting to stay awake.",pair:["tedious","monotonous"],decoys:["riveting","scintillating","concise","erudite"],why:"tedious and monotonous both mean boringly dull. riveting/scintillating are the trap pair — they mean fascinating."},
 {s:"Investors grew increasingly ____ as the company's debts mounted and its stock kept plummeting.",pair:["apprehensive","uneasy"],decoys:["complacent","sanguine","jubilant","indifferent"],why:"apprehensive and uneasy both mean anxious. sanguine/jubilant are the opposite (optimistic and joyful)."},
 {s:"The treaty's terms were deliberately ____, letting each side interpret them however it pleased.",pair:["ambiguous","equivocal"],decoys:["explicit","unequivocal","concise","blunt"],why:"ambiguous and equivocal both mean open to multiple meanings. explicit/unequivocal pair up but mean perfectly clear."},
 {s:"A truly ____ leader, she shared the credit generously and forgave even her harshest critics.",pair:["magnanimous","gracious"],decoys:["vindictive","petty","aloof","garrulous"],why:"magnanimous and gracious both mean generous and big-hearted. vindictive/petty are the opposite."},
 {s:"The scientist's claims were dismissed as ____, backed by no credible data whatsoever.",pair:["spurious","baseless"],decoys:["irrefutable","substantiated","meticulous","arcane"],why:"spurious and baseless both mean false and unfounded. irrefutable/substantiated are the opposite (well-supported)."},
 {s:"Stripped of every comfort and decoration, the monastery's rooms were strikingly ____.",pair:["austere","spartan"],decoys:["opulent","lavish","ornate","cluttered"],why:"austere and spartan both mean severely plain and bare. opulent/lavish form a tempting pair, but they mean the opposite (luxurious)."}
];
let PT=null;
function startPick(){toast("🎯 Pick-the-2 — choose the TWO words that fit AND mean the same");setTimeout(()=>{PT={q:shuffle(SE.map((_,i)=>i)),i:0,ok:0};pickq()},350)}
function pickq(){if(PT.i>=PT.q.length)return trapEnd('Pick-the-2',PT.ok,PT.q.length);const it=SE[PT.q[PT.i]];PT.it=it;PT.opts=shuffle([...it.pair,...it.decoys]);PT.sel=[];PT.done=false;renderPick()}
function renderPick(){const it=PT.it;const chips=PT.opts.map((w,i)=>`<button class="pkchip ${PT.sel.includes(i)?'sel':''}" onclick="pickSel(${i})">${w}</button>`).join('');
 $.innerHTML=topbar()+`<div class="screen"><div class="qtop"><button class="x" onclick="home()">✕</button><div class="pbar"><i style="width:${PT.i/PT.q.length*100}%"></i></div></div>
  <div class="badges"><span class="bdg" style="color:var(--sky);border-color:#4FB0FF66">🎯 Pick-the-2 · GRE Sentence Equivalence</span></div>
  <div class="prompt">pick the TWO words that fit AND mean the same</div>
  <div class="blankq">${it.s.replace('____','<span style="color:var(--sky)">______</span>')}</div>
  <div class="pkchips">${chips}</div>
  <button class="cta" style="margin-top:16px" onclick="pickCheck()" ${PT.sel.length===2?'':'disabled style="opacity:.5"'}>check · ${PT.sel.length}/2 picked</button>
  <div id="rev"></div></div>`}
function pickSel(i){if(PT.done)return;const idx=PT.sel.indexOf(i);if(idx>=0)PT.sel.splice(idx,1);else{if(PT.sel.length>=2)return;PT.sel.push(i)}sTap();renderPick()}
function pickCheck(){if(PT.sel.length!==2||PT.done)return;PT.done=true;const it=PT.it;const chosen=PT.sel.map(i=>PT.opts[i]).slice().sort(),cp=[...it.pair].sort();const correct=chosen[0]===cp[0]&&chosen[1]===cp[1];
 document.querySelectorAll('.pkchip').forEach((el,i)=>{const w=PT.opts[i];el.setAttribute('disabled','');if(it.pair.includes(w))el.classList.add('pkok');else if(PT.sel.includes(i))el.classList.add('pkno')});
 if(correct)PT.ok++;S.totAns++;logDay(correct);if(correct){S.totOk++;addXP(25);celebrate(3)}else{addXP(4);sBad()}S.goalCount++;rollGoal();save();checkBadges();
 document.getElementById('rev').innerHTML=`<div class="reveal ${correct?'good':'bad'}"><div class="vtag">${correct?'😎 nailed the pair!':"😵 not the right pair"}</div><div class="rdef" style="font-size:16px">✅ ${it.pair[0]} + ${it.pair[1]}</div><div class="sent" style="margin-top:8px;font-style:normal">${it.why}</div><button class="cta" style="margin-top:12px" onclick="PT.i++;pickq()">${PT.i+1>=PT.q.length?'finish':'next'}</button></div>`}
/* ===== name, avatar buddy, welcome pop-up ===== */
const AVATARS=['🦊','🐼','🐱','🐶','🐧','🦉','🐨','🐸','🦁','🐯','🐰','🐻','🐹','🦄','🐵','🐙','🐷','🐮','🐔','🦝'];
function welcome(){const learned=Object.values(S.cards).filter(c=>c.seen).length;const pct=WORDS.length?Math.round(100*learned/WORDS.length):0;const nm=S.name?(', '+S.name):'';
 const m=document.createElement('div');m.className='modal';m.onclick=e=>{if(e.target===m)m.remove()};
 m.innerHTML=`<div class="sheet" style="text-align:center;max-width:340px"><div style="font-size:62px;line-height:1">${S.avatar||'🦊'}</div>
  <h3 style="margin-top:6px">welcome back${nm}! 👋</h3><div class="muted" style="margin:6px 0 14px">here's how far you've come</div>
  <div style="font-size:38px;font-weight:900;color:var(--mint);line-height:1">${learned} <span style="font-size:18px;color:var(--mut);font-weight:800">/ ${WORDS.length}</span></div>
  <div class="muted" style="font-size:13px;margin-top:3px">words learned · ${pct}%</div>
  <div class="qbar" style="margin-top:14px"><i style="width:${pct}%;background:linear-gradient(90deg,var(--mint),var(--sky))"></i></div>
  <button class="cta" style="margin-top:18px" onclick="this.closest('.modal').remove()">let's flex some words ✨</button></div>`;
 document.body.appendChild(m)}
function openProfile(){const cur=S.avatar||'🦊';
 const grid=AVATARS.map(e=>`<button onclick="pickAvatar('${e}')" style="font-size:30px;background:${e===cur?'rgba(255,255,255,.12)':'transparent'};border:2px solid ${e===cur?'var(--lav)':'var(--line)'};border-radius:14px;padding:8px 0;cursor:pointer">${e}</button>`).join('');
 const m=document.createElement('div');m.className='modal';m.onclick=ev=>{if(ev.target===m){const n=document.getElementById('nm');if(n){S.name=n.value.trim();save()}m.remove()}};
 m.innerHTML=`<div class="sheet"><h3>your profile 🎀</h3><div class="sub">pick a name and a study buddy</div>
  <input id="nm" class="typein" style="text-transform:none;font-size:18px;text-align:left;letter-spacing:0" placeholder="type your name" value="${(S.name||'').replace(/"/g,'&quot;')}" maxlength="20" autocomplete="off">
  <div class="ey" style="margin:16px 0 8px">pick your buddy</div>
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px">${grid}</div>
  <button class="cta" style="margin-top:18px" onclick="saveProfile()">save ✨</button></div>`;
 document.body.appendChild(m);setTimeout(()=>{const n=document.getElementById('nm');if(n)n.focus()},150)}
function pickAvatar(e){const n=document.getElementById('nm');if(n)S.name=n.value.trim();S.avatar=e;save();sTap();const m=document.querySelector('.modal');if(m)m.remove();openProfile()}
function saveProfile(){const n=document.getElementById('nm');if(n)S.name=n.value.trim();save();const m=document.querySelector('.modal');if(m)m.remove();toast((S.avatar||'🦊')+' looking good'+(S.name?(', '+S.name):'')+'!');home()}
applySkin();home();welcome();loadDrops();

</script>
</body></html>
