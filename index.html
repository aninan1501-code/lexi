<style>
  :root{
    --bg:#140E26; --card:rgba(255,255,255,.07); --soft:rgba(255,255,255,.04); --line:rgba(255,255,255,.13); --ink:#F4EFFF; --mut:#BCAFDC; --mut2:#897CB0;
    --coral:#FF6B8A; --peach:#FF9E5E; --sun:#FFC23D; --mint:#2FCB9B; --sky:#4FB0FF; --lav:#9B82FF; --pink:#FF7FB0;
    --sh:0 6px 18px -8px rgba(0,0,0,.5); --sh2:0 12px 30px -10px rgba(0,0,0,.62); --track:rgba(255,255,255,.14);
    --f:"Segoe UI",-apple-system,system-ui,Roboto,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:var(--f);color:var(--ink);background:var(--bg);min-height:100vh;line-height:1.45;
    background-image:radial-gradient(70% 40% at 90% -5%,rgba(155,130,255,.5) 0,transparent 50%),radial-gradient(60% 35% at 0% 3%,rgba(255,127,176,.4) 0,transparent 50%),radial-gradient(80% 45% at 50% 108%,rgba(79,176,255,.4) 0,transparent 55%);
    background-attachment:fixed;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  #app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;padding:max(14px,env(safe-area-inset-top)) 16px calc(24px + env(safe-area-inset-bottom))}
  #app.flash{animation:flash .4s} @keyframes flash{0%,100%{filter:none}50%{filter:brightness(1.15)}}
  #app.shake{animation:appshake .4s} @keyframes appshake{0%,100%{transform:none}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  .screen{animation:rise .3s cubic-bezier(.2,.7,.2,1)}
  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  @keyframes pop{0%{transform:scale(0)}80%{transform:scale(1.1)}100%{transform:scale(1)}}
  @keyframes flip{0%{transform:rotateY(90deg);opacity:0}100%{transform:rotateY(0);opacity:1}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .logo{font-weight:900;font-size:28px;letter-spacing:-.03em;font-style:italic;background:linear-gradient(95deg,var(--coral),var(--peach) 55%,var(--sun));-webkit-background-clip:text;background-clip:text;color:transparent}
  .chips{display:flex;gap:6px;align-items:center}
  .chip{display:flex;align-items:center;gap:4px;background:var(--card);border:1px solid var(--line);padding:6px 9px;border-radius:999px;font-weight:800;font-size:13px;box-shadow:var(--sh)}
  .chip.fl{color:#F08A2E} .chip.co{color:var(--mint)}
  .iconbtn{background:var(--card);border:1px solid var(--line);color:var(--ink);width:34px;height:34px;border-radius:10px;font-size:15px;cursor:pointer;box-shadow:var(--sh)}
  .ey{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut2);font-weight:800}
  .muted{color:var(--mut)} h1,h2,h3{margin:0;letter-spacing:-.02em}

  .scoreboard{display:flex;gap:7px;margin:0 0 13px}
  .sb{flex:1;background:var(--card);border:1px solid var(--line);border-radius:15px;padding:9px 3px;text-align:center;box-shadow:var(--sh);animation:pop .4s cubic-bezier(.2,1.3,.4,1)}
  .sb .n{font-size:20px;font-weight:900;line-height:1;font-variant-numeric:tabular-nums}
  .sb .t{font-size:9px;color:var(--mut);margin-top:3px}
  .sb:nth-child(1) .n{color:var(--sky)} .sb:nth-child(2) .n{color:var(--mint)} .sb:nth-child(3) .n{color:var(--coral)} .sb:nth-child(4) .n{color:var(--sun)}
  .learnbar{margin:0 0 13px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 13px;box-shadow:var(--sh)}
  .lbtop{display:flex;justify-content:space-between;font-size:12.5px;font-weight:700;margin-bottom:6px} .lbtop b{color:var(--lav)}
  .lbnote{font-size:10.5px;color:var(--mut2);margin-top:7px;line-height:1.4}

  .hero{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:22px;padding:15px;box-shadow:var(--sh2);position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;inset:0;background:linear-gradient(120deg,rgba(255,127,176,.08),rgba(79,176,255,.06));pointer-events:none}
  .masc{width:74px;height:74px;border-radius:22px;flex:none;display:grid;place-items:center;font-size:42px;background:linear-gradient(135deg,#FF9E5E,#FF6B8A);border:1px solid var(--line);animation:bob 3s ease-in-out infinite;z-index:1}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  .hero .hi{z-index:1;flex:1}
  .hero .lvlrow{display:flex;align-items:center;gap:8px;font-weight:900;font-size:18px}
  .hero .tag{font-size:11px;font-weight:800;color:#fff;background:linear-gradient(90deg,var(--coral),var(--peach));padding:2px 8px;border-radius:999px}
  .hero .say{font-size:13px;color:var(--mut);margin-top:3px}
  .xpbar{height:9px;border-radius:999px;background:var(--track);margin-top:8px;overflow:hidden}
  .xpbar>i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--coral),var(--peach));width:0;transition:width .8s cubic-bezier(.2,.7,.2,1)}

  .quest{margin-top:13px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 15px;display:flex;align-items:center;gap:12px;box-shadow:var(--sh)}
  .quest .ttl{font-weight:800;font-size:14px} .quest .sub{font-size:12px;color:var(--mut)}
  .qbar{height:7px;border-radius:999px;background:var(--track);margin-top:7px;overflow:hidden}
  .qbar>i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--mint),var(--sky))}
  .quest .qn{font-weight:900;font-size:15px;font-variant-numeric:tabular-nums}

  .pus{display:flex;gap:8px;margin-top:12px}
  .pu{flex:1;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:9px;text-align:center;font-size:12px;color:var(--mut);box-shadow:var(--sh)}
  .pu .e{font-size:18px} .pu b{display:block;color:var(--ink);font-size:15px;margin-top:1px}

  .cta{width:100%;border:0;border-radius:18px;padding:18px;margin-top:15px;cursor:pointer;font-family:inherit;font-weight:900;font-size:18px;color:#fff;letter-spacing:-.01em;background:linear-gradient(95deg,var(--coral),var(--peach));box-shadow:0 12px 26px -10px rgba(255,107,138,.6);display:flex;align-items:center;justify-content:center;gap:9px;transition:transform .12s}
  .cta:active{transform:scale(.98)}
  .cta.alt{background:linear-gradient(95deg,var(--mint),var(--sky));box-shadow:0 12px 26px -10px rgba(47,203,155,.5)}
  .cta.ghost{background:var(--card);border:1px solid var(--line);color:var(--ink);box-shadow:var(--sh);font-size:15px;padding:14px}
  .cta .pill{background:rgba(255,255,255,.25);padding:3px 10px;border-radius:999px;font-size:13px}

  .sect{margin-top:20px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
  .tile{border:1px solid var(--line);border-radius:16px;padding:14px;cursor:pointer;text-align:left;font-family:inherit;color:var(--ink);background:var(--card);box-shadow:var(--sh);transition:transform .12s}
  .tile:active{transform:scale(.97)}
  .tile .ic{font-size:23px} .tile .t{font-weight:900;margin-top:7px;font-size:15px} .tile .d{font-size:11.5px;color:var(--mut);margin-top:1px;line-height:1.35}
  .tile.locked{opacity:.5}

  .zrow{display:flex;align-items:center;gap:11px;margin:9px 0;cursor:pointer;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 12px;box-shadow:var(--sh)}
  .zrow .ze{font-size:24px;width:32px;text-align:center} .zrow .zn{flex:1} .zrow .znm{font-weight:800;font-size:14px} .zrow .zd{font-size:11px;color:var(--mut)}
  .zbar{height:8px;border-radius:999px;background:var(--track);overflow:hidden;margin-top:5px} .zbar>i{display:block;height:100%;border-radius:999px}
  .zrow .zp{font-size:12px;color:var(--mut);width:38px;text-align:right;font-variant-numeric:tabular-nums}

  .qtop{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .x{background:var(--card);border:1px solid var(--line);color:var(--ink);width:38px;height:38px;border-radius:11px;font-size:18px;cursor:pointer;flex:none;box-shadow:var(--sh)}
  .pbar{flex:1;height:9px;border-radius:999px;background:var(--track);overflow:hidden}
  .pbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--coral),var(--peach));width:0;transition:width .35s}
  .combo{font-weight:900;font-size:14px;color:var(--peach);opacity:0;transition:.2s} .combo.on{opacity:1;animation:pop .3s}

  .badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .bdg{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:800;padding:4px 9px;border-radius:999px;border:1px solid;cursor:pointer;background:var(--card)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--sh2);padding:20px 18px;position:relative;overflow:hidden}
  .card::before{content:"";position:absolute;top:0;left:0;right:0;height:5px;background:var(--accent,var(--coral))}
  .word{font-size:36px;font-weight:900;letter-spacing:-.01em;text-align:center;margin:4px 0 2px;animation:flip .4s}
  .pos{text-align:center;color:var(--mut2);font-style:italic;font-size:14px;margin-bottom:14px}
  .prompt{font-size:14px;color:var(--mut);text-align:center;margin-bottom:14px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
  .blankq{font-size:19px;font-weight:700;line-height:1.45;margin:2px 4px 18px;text-align:center}
  .opts{display:flex;flex-direction:column;gap:9px}

const $=document.getElementById('screen'),APP=document.getElementById('app');
const GOAL=15, DAYMS=86400000, INTERVAL=[0,1,2,4,8,16];
const BADGES={first:{e:"🌱",t:"first word",d:"learned your first word"},streak7:{e:"🔥",t:"week streak",d:"7-day streak"},combo:{e:"🎯",t:"on a roll",d:"10 correct in a row"},boss:{e:"👑",t:"boss slayer",d:"mastered 10 Boss words"},trap:{e:"🛡️",t:"trap-proof",d:"aced 15 trap words"},cent:{e:"💯",t:"centurion",d:"answered 100"}};
let MEM={};const DB={get(k){try{return localStorage.getItem(k)}catch(e){return MEM[k]??null}},set(k,v){try{localStorage.setItem(k,v)}catch(e){MEM[k]=v}}};
function today(){return new Date().toISOString().slice(0,10)}
function todayN(){const d=new Date();return Math.floor((d-new Date(d.getFullYear(),0,0))/DAYMS)+d.getFullYear()*366}
function freshState(){return{cards:{},lastFmt:{},seenBadges:[],streak:0,best:0,last:null,xp:0,goalDate:null,goalCount:0,badges:[],hist:{},totAns:0,totOk:0,trapOk:0,trapWordOk:{},maxRun:0,sound:true,skin:0,pu:{fifty:2,dbl:2,freeze:1}}}
let S=load();
function load(){try{const r=DB.get('lexi');if(r)return Object.assign(freshState(),JSON.parse(r))}catch(e){}return freshState()}
function save(){DB.set('lexi',JSON.stringify(S))}
function cs(id){return S.cards[id]||(S.cards[id]={box:0,due:0,seen:false,ok:0,no:0})}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]]}return a}
function word(id){return WORDS.find(w=>w.id===id)}
function dueIds(){return WORDS.filter(w=>{const t=S.cards[w.id];return t&&t.seen&&t.due<=todayN()}).map(w=>w.id)}
function newIds(){return WORDS.filter(w=>!(S.cards[w.id]&&S.cards[w.id].seen)).map(w=>w.id)}
function wrongIds(){return WORDS.filter(w=>{const t=S.cards[w.id];return t&&t.seen&&t.box<=1&&t.no>0}).map(w=>w.id)}
function rightOf(ws){return ws.filter(w=>S.cards[w.id]&&S.cards[w.id].ok>0).length}
function buildBurst(){let due=shuffle(dueIds()),nw=shuffle(newIds()),q=due.slice(0,9);for(const id of nw){if(q.length>=GOAL)break;q.push(id)}for(const id of due.slice(9)){if(q.length>=GOAL)break;q.push(id)}if(!q.length)q=shuffle(WORDS.map(w=>w.id)).slice(0,10);return shuffle(q)}
function levelOf(xp){return 1+Math.floor(xp/150)}
function rollGoal(){const t=today();if(S.goalDate!==t){S.goalDate=t;S.goalCount=0}}
function addXP(n){const b=levelOf(S.xp);S.xp+=n;const a=levelOf(S.xp);if(a>b){const k=['fifty','dbl','freeze'][a%3];S.pu[k]=(S.pu[k]||0)+1;milestone("🎉","LEVEL "+a+"!","+1 "+(k==='fifty'?'50:50':k==='dbl'?'2× XP':'freeze'))}}
function award(b){if(!S.badges.includes(b)){S.badges.push(b);milestone(BADGES[b].e,BADGES[b].t+"!",BADGES[b].d)}}
function checkBadges(){if(S.totAns>=1)award('first');if(S.streak>=7)award('streak7');if(S.maxRun>=10)award('combo');if(WORDS.filter(w=>w.rank==='boss'&&S.cards[w.id]&&S.cards[w.id].box>=4).length>=10)award('boss');if(S.trapOk>=15)award('trap');if(S.totAns>=100)award('cent')}
function checkStreakLoad(){const t=today();if(S.last&&S.last!==t){const y=new Date(Date.now()-DAYMS).toISOString().slice(0,10);if(S.last!==y){if((S.pu.freeze||0)>0&&S.last===new Date(Date.now()-2*DAYMS).toISOString().slice(0,10)){S.pu.freeze--;S.last=y;setTimeout(()=>toast("🥶 streak freeze used — saved!"),600)}else S.streak=0;save()}}}

/* ===== audio + celebration ===== */
let AC;function beep(f,d,t,v){if(!S.sound)return;try{AC=AC||new(window.AudioContext||window.webkitAudioContext)();const o=AC.createOscillator(),g=AC.createGain();o.type=t||'sine';o.frequency.value=f;o.connect(g);g.connect(AC.destination);g.gain.setValueAtTime(.0001,AC.currentTime);g.gain.exponentialRampToValueAtTime(v||.18,AC.currentTime+.01);g.gain.exponentialRampToValueAtTime(.0001,AC.currentTime+d);o.start();o.stop(AC.currentTime+d)}catch(e){}}
function comboChime(run){const base=560+Math.min(run,8)*70;beep(base,.1);setTimeout(()=>beep(base*1.5,.13),70)}
const sBad=()=>beep(150,.2,'square');const sTap=()=>beep(440,.05);
function jingle(){[523,659,784,1046,1318].forEach((f,i)=>setTimeout(()=>beep(f,.16,'triangle'),i*85))}
function fanfare(){[392,523,659,784,1046,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,.18,'triangle',.2),i*90))}
const cf=document.getElementById('cf'),cx=cf.getContext('2d');let parts=[];const COLS=['#FF6B8A','#FF9E5E','#FFC23D','#2FCB9B','#4FB0FF','#9B82FF','#FF7FB0'];
function confettiBurst(n){if(matchMedia('(prefers-reduced-motion:reduce)').matches)return;cf.width=innerWidth;cf.height=innerHeight;const was=parts.length;for(let i=0;i<n;i++)parts.push({x:innerWidth/2+(Math.random()-.5)*120,y:innerHeight*.34,vx:(Math.random()-.5)*11,vy:Math.random()*-13-3,g:.36,c:COLS[i%COLS.length],s:5+Math.random()*7,r:Math.random()*6});if(was===0)anim()}
function anim(){cx.clearRect(0,0,cf.width,cf.height);parts=parts.filter(p=>p.y<cf.height+30);parts.forEach(p=>{p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.r+=.2;cx.save();cx.translate(p.x,p.y);cx.rotate(p.r);cx.fillStyle=p.c;cx.fillRect(-p.s/2,-p.s/2,p.s,p.s);cx.restore()});if(parts.length)requestAnimationFrame(anim);else cx.clearRect(0,0,cf.width,cf.height)}
function flashScreen(){APP.classList.add('flash');setTimeout(()=>APP.classList.remove('flash'),420)}
function shakeScreen(){APP.classList.add('shake');setTimeout(()=>APP.classList.remove('shake'),420)}
function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2500)}
function milestone(e,t,sub){const m=document.createElement('div');m.className='mile';m.innerHTML=`<div class="milecard"><div class="me">${e}</div><div class="mt">${t}</div>${sub?`<div class="muted" style="font-size:13px;margin-top:4px">${sub}</div>`:''}</div>`;document.body.appendChild(m);confettiBurst(140);flashScreen();fanfare();setTimeout(()=>m.remove(),1700)}
/* tiered celebration on a correct answer */
function celebrate(run){comboChime(run);if(run>=10){milestone("🔥","10 IN A ROW!","you're on fire 🔥");return}if(run>=5){confettiBurst(60);flashScreen();return}if(run>=3)confettiBurst(34);else confettiBurst(16)}

function legend(){const row=(o)=>`<div class="leg"><div class="le">${o.e}</div><div><div class="lt" style="color:${o.c||'var(--ink)'}">${o.n}</div><div class="ld">${o.desc}</div></div></div>`;const m=document.createElement('div');m.className='modal';m.onclick=(e)=>{if(e.target===m)m.remove()};m.innerHTML=`<div class="sheet"><h3>what do the signs mean? 🔑</h3><div class="sub">tap outside to close</div><div class="ey" style="margin-top:6px">word ranks</div>${Object.values(RANK).map(row).join('')}<div class="ey" style="margin-top:14px">trap types</div>${Object.values(TAG).map(row).join('')}<div class="ey" style="margin-top:14px">game</div>${Object.values(GAME).map(row).join('')}<button class="cta" style="margin-top:16px" onclick="this.closest('.modal').remove()">got it ✨</button></div>`;document.body.appendChild(m)}
function badgeInfo(key){const o=RANK[key]||TAG[key];if(o)toast(o.e+" "+o.n+" — "+o.desc)}
function seeBadge(key){if(!S.seenBadges.includes(key)){S.seenBadges.push(key);save();const o=RANK[key]||TAG[key];if(o)setTimeout(()=>toast("new: "+o.e+" "+o.n+" — "+o.desc),300)}}
function badgeHTML(w){let h=`<span class="bdg" style="color:${RANK[w.rank].c};border-color:${RANK[w.rank].c}66" onclick="badgeInfo('${w.rank}')">${RANK[w.rank].e} ${RANK[w.rank].n}</span>`;(w.tags||[]).forEach(t=>{h+=`<span class="bdg" style="color:${TAG[t].c};border-color:${TAG[t].c}66" onclick="badgeInfo('${t}')">${TAG[t].e} ${TAG[t].n}</span>`});return h}

/* ===== HOME ===== */
function mascot(){const s=S.streak;if(s>=7)return{e:"🤩",l:"word wizard mode. unstoppable."};if(s>=3)return{e:"😎",l:"you're on a roll — keep it lit."};if(s>=1)return{e:"🦊",l:"streak going. don't fumble it."};return{e:"🦊",l:"hey! ready to flex some words?"}}
function topbar(){return `<div class="top"><div class="logo">lexi</div><div class="chips"><span class="chip fl">🔥 ${S.streak}</span><span class="chip co">⚡ ${S.xp}</span><button class="iconbtn" onclick="openSkins()" title="skins">🎨</button><button class="iconbtn" onclick="legend()" title="signs">❓</button><button class="iconbtn" onclick="checkUpdate()" title="update">🔄</button><button class="iconbtn" onclick="S.sound=!S.sound;save();sTap();home()">${S.sound?'🔊':'🔇'}</button></div></div>`}
function home(){checkStreakLoad();rollGoal();save();
 const m=mascot(),lvl=levelOf(S.xp),into=S.xp%150,due=dueIds().length+newIds().length;
 const acc=S.totAns?Math.round(100*S.totOk/S.totAns):0,learned=Object.values(S.cards).filter(c=>c.seen).length,frac=Math.min(1,S.goalCount/GOAL);
 const zones=Object.keys(RANK).map(r=>{const ws=WORDS.filter(w=>w.rank===r);const right=rightOf(ws),tot=ws.length;const pct=tot?Math.round(100*right/tot):0;return `<div class="zrow" onclick="startRank('${r}')"><div class="ze">${RANK[r].e}</div><div class="zn"><div class="znm" style="color:${RANK[r].c}">${RANK[r].n}</div><div class="zd">✅ ${right} right · ${tot} words total</div><div class="zbar"><i style="width:${pct}%;background:${RANK[r].c}"></i></div></div><div class="zp">${right}/${tot}</div></div>`}).join('');
 $.innerHTML=topbar()+`<div class="screen">
  <div class="scoreboard"><div class="sb"><div class="n">${S.totAns}</div><div class="t">📊 answered</div></div><div class="sb"><div class="n">${S.totOk}</div><div class="t">🎯 right</div></div><div class="sb"><div class="n">${S.totAns-S.totOk}</div><div class="t">💥 wrong</div></div><div class="sb"><div class="n">${acc}%</div><div class="t">🏅 accuracy</div></div></div>
  <div class="learnbar"><div class="lbtop"><span>📚 words learned</span><span><b>${learned}</b> / ${WORDS.length}</span></div><div class="qbar"><i style="width:${WORDS.length?100*learned/WORDS.length:0}%;background:linear-gradient(90deg,var(--lav),var(--sky))"></i></div><div class="lbnote">📊 answered = 🎯 right + 💥 wrong (every attempt). a word can be replayed, so it can run higher than words learned.</div></div>
  <div class="hero"><div class="masc">${m.e}</div><div class="hi"><div class="lvlrow">lexi lvl ${lvl} <span class="tag">⚡ ${into}/150</span></div><div class="say">${m.l}</div><div class="xpbar"><i id="xpb"></i></div></div></div>
  <div class="quest"><div style="flex:1"><div class="ttl">today's words 🎯</div><div class="sub">${S.goalCount>=GOAL?"🎉 goal of "+GOAL+" smashed — keep going!":"daily goal: "+GOAL+" words"}</div><div class="qbar"><i style="width:${frac*100}%"></i></div></div><div class="qn">${S.goalCount>=GOAL?S.goalCount+" ✓":S.goalCount+"/"+GOAL}</div></div>
  <div class="pus"><div class="pu"><div class="e">✂️</div><b>${S.pu.fifty||0}</b>50:50</div><div class="pu"><div class="e">⚡</div><b>${S.pu.dbl||0}</b>2× XP</div><div class="pu"><div class="e">🥶</div><b>${S.pu.freeze||0}</b>freeze</div></div>
  <button class="cta" onclick="startBurst()">start today's words ${due?`<span class="pill">${Math.min(GOAL,Math.max(due,1))}</span>`:''}</button>
  <div class="sect"><div class="ey">fortify your words</div><div class="grid2">
   <button class="tile" onclick="startMatch()"><div class="ic">🔗</div><div class="t">match-up</div><div class="d">word ↔ meaning</div></button>
   <button class="tile" onclick="startFake()"><div class="ic">🃏</div><div class="t">real or fake</div><div class="d">spot the made-up word</div></button>
   <button class="tile ${wrongIds().length?'':'locked'}" onclick="startRedeem()"><div class="ic">🩹</div><div class="t">redemption</div><div class="d">${wrongIds().length} to fix</div></button>
   <button class="tile" onclick="startSurvival()"><div class="ic">💀</div><div class="t">survival</div><div class="d">one wrong = over</div></button>
  </div></div>
  <div class="sect"><div class="ey">your zones <span style="cursor:pointer" onclick="legend()">· what's this? 🔑</span></div><div style="margin-top:8px">${zones}</div></div>
  <div class="sect"><div class="ey">trap drills 🧨 <span style="cursor:pointer" onclick="legend()">· what's this? 🔑</span></div><div class="grid2" style="margin-top:10px">
   ${[['imp','Twin Tap'],['da','Caught in Context'],['sqd','Squad Goals'],['vf','Vibe Check']].map(([t,g])=>{const ws=WORDS.filter(w=>w.tags&&w.tags.includes(t));const right=ws.filter(w=>S.trapWordOk&&S.trapWordOk[w.id]).length;return `<button class="tile" style="border-color:${TAG[t].c}66" onclick="startTrap('${t}')"><div class="ic">${TAG[t].e}</div><div class="t">${TAG[t].n}</div><div class="d">${g}<br>✅ ${right}/${ws.length} aced here</div></button>`}).join('')}
  </div></div>
  <div class="sect"><button class="cta ghost" onclick="stats()">progress & flex card 💅</button><button class="cta" style="margin-top:10px" onclick="saveApp()">⬇ save / install this app</button></div>
  <div class="footnote">${WORDS.length} GRE words · ranks, traps & 6 game formats · weekly word drops can auto-load.</div></div>`;
 requestAnimationFrame(()=>{const b=document.getElementById('xpb');if(b)b.style.width=(into/150*100)+'%'})}
function startRank(r){const ids=WORDS.filter(w=>w.rank===r).map(w=>w.id);Q={queue:shuffle(ids).slice(0,GOAL),i:0,ok:0,run:0,mode:'rank',dbl:false};quiz()}


function pickN(arr,n,ex){return shuffle(arr.filter(x=>!ex.includes(x))).slice(0,n)}
/* ===== DAILY GAME: 6 rotating formats ===== */
let Q=null;
function startBurst(){Q={queue:buildBurst(),i:0,ok:0,run:0,mode:'burst',dbl:false};quiz()}
function startRedeem(){const w=wrongIds();if(!w.length){toast("nothing to fix — you ate that 😌");return}Q={queue:shuffle(w).slice(0,GOAL),i:0,ok:0,run:0,mode:'redeem',dbl:false};quiz()}
function chooseFmt(w){let v=['flip','type','unscramble','define'];if(w.syn&&w.syn.length)v.push('synonym');if(w.sent.toLowerCase().includes(w.w.toLowerCase()))v.push('blank');const last=S.lastFmt[w.id];const o=v.filter(f=>f!==last);return (o.length?o:v)[Math.random()*(o.length?o.length:v.length)|0]}
function head(){const w=Q.w;return topbar()+`<div class="screen"><div class="qtop"><button class="x" onclick="quitSession()">✕</button><div class="pbar"><i style="width:${Q.i/Q.queue.length*100}%"></i></div><div class="combo ${Q.run>=2?'on':''}">🔥 x${Q.run}</div></div><div class="badges">${badgeHTML(w)}</div>`}
function quiz(){if(Q.i>=Q.queue.length)return endQuiz();const w=word(Q.queue[Q.i]);Q.w=w;const fmt=chooseFmt(w);Q.fmt=fmt;S.lastFmt[w.id]=fmt;seeBadge(w.rank);(w.tags||[]).forEach(seeBadge);
 if(fmt==='flip')return renderFlip();if(fmt==='type')return renderType();if(fmt==='unscramble')return renderScramble();
 Q.cur=genQ(w,fmt);const o=Q.cur.opts.map((t,i)=>`<button class="opt" id="o${i}" onclick="pickMCQ(${i})"><span class="k">${'ABCD'[i]}</span><span>${t}</span></button>`).join('');
 const body=Q.cur.bigWord?`<div class="card" style="--accent:${RANK[w.rank].c}"><div class="word">${Q.cur.bigWord}</div><div class="pos">${w.pos}</div></div>`:`<div class="blankq">${Q.cur.blankQ}</div>`;
 $.innerHTML=head()+`${body}<div class="prompt">${Q.cur.prompt}</div><div class="opts">${o}</div>${puqRow()}<div id="rev"></div></div>`}
function genQ(w,fmt){let bigWord=null,blankQ=null,prompt='',correct='',opts=[];
 if(fmt==='synonym'){bigWord=w.w;prompt="closest in meaning?";correct=shuffle(w.syn)[0];opts=shuffle([correct,...pickN(WORDS.map(x=>x.w),3,[w.w,...w.syn])])}
 else if(fmt==='blank'){blankQ=w.sent.replace(new RegExp(w.w,'i'),'______');prompt="which word fits?";correct=w.w;opts=shuffle([correct,...pickN(WORDS.map(x=>x.w),3,[w.w])])}
 else{bigWord=w.w;prompt="what's the vibe?";correct=w.def;opts=shuffle([correct,...pickN(WORDS.map(x=>x.def),3,[w.def])])}
 return{bigWord,blankQ,prompt,opts,ci:opts.indexOf(correct)}}
function puqRow(){return `<div style="display:flex;gap:8px;margin-top:12px"><button class="cta ghost puqb" style="flex:1;margin:0;padding:9px;font-size:12px" onclick="useFifty()" ${(S.pu.fifty||0)>0?'':'disabled'}>✂️ 50:50 (${S.pu.fifty||0})</button><button class="cta ghost puqb" style="flex:1;margin:0;padding:9px;font-size:12px" onclick="useDbl()" ${(S.pu.dbl||0)>0&&!Q.dbl?'':'disabled'}>${Q.dbl?'⚡ 2× armed':'⚡ 2× ('+(S.pu.dbl||0)+')'}</button></div>`}
function useFifty(){if((S.pu.fifty||0)<=0)return;S.pu.fifty--;save();sTap();let wr=[0,1,2,3].filter(i=>i!==Q.cur.ci);wr=shuffle(wr).slice(0,2);wr.forEach(i=>{const el=document.getElementById('o'+i);if(el){el.style.opacity=.3;el.setAttribute('disabled','')}});event.target.setAttribute('disabled','')}
function useDbl(){if((S.pu.dbl||0)<=0||Q.dbl)return;S.pu.dbl--;Q.dbl=true;save();sTap();event.target.textContent='⚡ 2× armed';event.target.setAttribute('disabled','')}
function applyResult(w,correct){const st=cs(w.id);st.seen=true;S.totAns++;let g;if(correct){st.ok++;st.box=Math.min(5,st.box+1);st.due=todayN()+INTERVAL[st.box];S.totOk++;Q.ok++;Q.run++;if(Q.run>S.maxRun)S.maxRun=Q.run;if(w.tags&&w.tags.length)S.trapOk++;const mult=1+Math.min(Math.floor(Q.run/3),2),base=RANK[w.rank].xp,bonus=(w.tags?w.tags.length*5:0);g=Math.round((base+bonus)*mult*(Q.dbl?2:1));celebrate(Q.run)}else{st.no++;st.box=1;st.due=todayN();Q.run=0;g=2;sBad()}Q.dbl=false;addXP(g);rollGoal();S.goalCount++;const h=S.hist[today()]||(S.hist[today()]={a:0,o:0});h.a++;if(correct)h.o++;save();checkBadges();return g}
function revealBlock(w,correct,g){const line=correct?WIN[Math.random()*WIN.length|0]:MISS[Math.random()*MISS.length|0];return `<div class="xppop">+${g}${Q.run>=3&&correct?' 🔥':''}</div><div class="reveal ${correct?'good':'bad'}"><div class="vtag">${correct?(Q.run>=5?'🤩':'😎'):'😵'} ${line}</div><div class="rdef"><b>${w.w}</b> — ${w.def}</div>${w.hook?`<div class="hook"><span class="he">💡</span><div><b>trick:</b> ${w.hook}</div></div>`:''}<div class="sent">💬 ${w.sent}</div>${w.syn&&w.syn.length?`<div class="syns">🔁 ${w.syn.join(' · ')}</div>`:''}<button class="cta" style="margin-top:14px" onclick="nextQ()">${Q.i+1>=Q.queue.length?'see results':'next'}</button></div>`}
function pickMCQ(i){const w=Q.w,correct=i===Q.cur.ci;document.querySelectorAll('.opt').forEach((el,idx)=>{el.setAttribute('disabled','');if(idx===Q.cur.ci)el.classList.add('correct');else if(idx===i)el.classList.add('wrong','shake');else el.classList.add('dim')});document.querySelectorAll('.puqb').forEach(b=>b.setAttribute('disabled',''));const g=applyResult(w,correct);document.getElementById('rev').innerHTML=revealBlock(w,correct,g);document.getElementById('rev').scrollIntoView({behavior:'smooth',block:'nearest'})}
/* flip & know */
function renderFlip(){const w=Q.w;const clue=blankWord(w.sent,w.w);$.innerHTML=head()+`<div class="card" style="--accent:${RANK[w.rank].c}"><div class="prompt">⌨️ type the word from its meaning</div><div class="rdef" style="text-align:center;font-size:17px">${w.def}</div><div class="sent" style="text-align:center;margin-top:8px">💬 clue: ${clue}</div><div class="mask" id="mask"></div><input class="typein" id="fi" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false"></div><button class="cta alt" onclick="submitFlip()">check ✓</button><button class="cta ghost" onclick="flipGiveUp()" style="margin-top:8px">👎 don't know — show me</button><div id="rev"></div></div>`;setTimeout(()=>{const el=document.getElementById('fi');if(el){el.value=w.w[0];renderMask();el.addEventListener('input',renderMask);el.addEventListener('keydown',e=>{if(e.key==='Enter')submitFlip()});el.focus();try{el.setSelectionRange(9,9)}catch(e){}}},120)}
function renderMask(){const w=Q.w,el=document.getElementById('fi');if(!el)return;const v=(el.value||'').toLowerCase();let h='';for(let i=0;i<w.w.length;i++){const typed=v[i]!=null&&v[i]!=='';const ch=typed?v[i]:(i===0?w.w[0]:'–');h+=`<span class="mch${typed?' f':''}">${ch}</span>`}document.getElementById('mask').innerHTML=h}
function submitFlip(){const el=document.getElementById('fi');if(!el||el.disabled)return;const w=Q.w,correct=(el.value||'').trim().toLowerCase()===w.w.toLowerCase();el.disabled=true;el.style.borderColor=correct?'var(--mint)':'var(--coral)';const g=applyResult(w,correct);document.getElementById('rev').innerHTML=revealBlock(w,correct,g)}
function flipGiveUp(){const el=document.getElementById('fi');if(el)el.disabled=true;const w=Q.w,g=applyResult(w,false);document.getElementById('rev').innerHTML=revealBlock(w,false,g)}
function findStem(sent,word){const s=sent.toLowerCase(),st=word.slice(0,Math.max(4,word.length-2)).toLowerCase();let i=s.indexOf(st);if(i<0)return null;let j=i;while(j<sent.length&&/[a-z]/i.test(sent[j]))j++;return[i,j]}
function blankWord(sent,word){const r=findStem(sent,word);return r?sent.slice(0,r[0])+'______'+sent.slice(r[1]):sent}
function hlWord(sent,word,color){const r=findStem(sent,word);return r?sent.slice(0,r[0])+'<b style="color:'+color+'">'+sent.slice(r[0],r[1])+'</b>'+sent.slice(r[1]):sent}
/* type attack */
function renderType(){const w=Q.w;$.innerHTML=head()+`<div class="card" style="--accent:${RANK[w.rank].c}"><div class="prompt">⌨️ type the word</div><div class="rdef" style="text-align:center;font-size:17px">${w.def}</div><div class="hint">starts with “${w.w[0]}” · ${w.w.length} letters</div><input class="typein" id="ti" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false"></div><button class="cta alt" onclick="submitType()">check ✓</button><button class="cta ghost" onclick="typeGiveUp()" style="margin-top:8px">👎 don't know — show me</button><div id="rev"></div></div>`;setTimeout(()=>{const el=document.getElementById('ti');if(el){el.focus();el.addEventListener('keydown',e=>{if(e.key==='Enter')submitType()})}},120)}
function submitType(){const el=document.getElementById('ti');if(!el||el.disabled)return;const ans=(el.value||'').trim().toLowerCase(),w=Q.w,correct=ans===w.w.toLowerCase();el.disabled=true;el.style.borderColor=correct?'var(--mint)':'var(--coral)';const g=applyResult(w,correct);document.getElementById('rev').innerHTML=revealBlock(w,correct,g)}
/* unscramble */
function findTile(sc,letter){for(let i=0;i<sc.letters.length;i++){if(sc.letters[i]===letter&&!sc.used.includes(i))return i}return -1}
function renderScramble(){const w=Q.w;const sc={letters:shuffle(w.w.split('')),slots:Array(w.w.length).fill(null),used:[],locked:[]};Q.scr=sc;
 let t0=findTile(sc,w.w[0]);if(t0>=0){sc.slots[0]=t0;sc.used.push(t0);sc.locked.push(0)}
 if(w.w.length>=4){const cand=[];for(let j=1;j<w.w.length;j++)cand.push(j);const j=cand[Math.random()*cand.length|0];const tj=findTile(sc,w.w[j]);if(tj>=0){sc.slots[j]=tj;sc.used.push(tj);sc.locked.push(j)}}
 $.innerHTML=head()+`<div class="card" style="--accent:${RANK[w.rank].c}"><div class="prompt">🔡 unscramble the word</div><div class="rdef" style="text-align:center;font-size:16px">${w.def}</div><div class="slots" id="slots"></div><div class="tiles" id="tiles"></div><div class="hint">a couple of letters are given (locked) · <b style="color:var(--coral)">red</b> = wrong spot · tap a placed letter to take it back</div></div><button class="cta ghost" onclick="scrGiveUp()">👎 don't know — show me</button><div id="rev"></div></div>`;renderScr()}
function renderScr(){const w=Q.w,sc=Q.scr;document.getElementById('slots').innerHTML=sc.slots.map((li,i)=>{let ch='',cls='slot';const lk=sc.locked.includes(i);if(li!=null){ch=sc.letters[li];cls+=(ch===w.w[i]?' okc':' badc')}if(lk)cls+=' lock';return `<div class="${cls}" onclick="${lk?'':`scrRemove(${i})`}">${ch}</div>`}).join('');document.getElementById('tiles').innerHTML=sc.letters.map((L,i)=>`<button class="tileL ${sc.used.includes(i)?'used':''}" onclick="scrTap(${i})">${L}</button>`).join('')}
function scrTap(i){const sc=Q.scr;if(sc.used.includes(i))return;const slot=sc.slots.indexOf(null);if(slot<0)return;sTap();sc.slots[slot]=i;sc.used.push(i);renderScr();if(sc.slots.indexOf(null)<0){const ans=sc.slots.map(li=>sc.letters[li]).join('');if(ans===Q.w.w){beep(720,.1);setTimeout(scrCheck,340)}}}
function scrRemove(i){const sc=Q.scr;if(sc.locked.includes(i)||sc.slots[i]==null)return;const li=sc.slots[i];sc.slots[i]=null;sc.used=sc.used.filter(x=>x!==li);sTap();renderScr()}
function scrGiveUp(){const w=Q.w;document.querySelectorAll('.tileL').forEach(b=>b.setAttribute('disabled',''));const g=applyResult(w,false);document.getElementById('rev').innerHTML=revealBlock(w,false,g)}
function typeGiveUp(){const el=document.getElementById('ti');if(el)el.disabled=true;const w=Q.w;const g=applyResult(w,false);document.getElementById('rev').innerHTML=revealBlock(w,false,g)}
function scrCheck(){const w=Q.w,g=applyResult(w,true);document.getElementById('rev').innerHTML=revealBlock(w,true,g)}
function nextQ(){Q.i++;quiz()}
function quitSession(){if(Q&&Q.i>0&&Q.i<Q.queue.length){if(!confirm('bounce now? progress is saved.'))return}home()}
function endQuiz(){const acc=Q.queue.length?Math.round(100*Q.ok/Q.queue.length):0,met=S.goalCount>=GOAL,t=today();if(met&&S.last!==t){const y=new Date(Date.now()-DAYMS).toISOString().slice(0,10);S.streak=(S.last===y)?S.streak+1:(S.last===t?S.streak:1);if(S.streak>S.best)S.best=S.streak;S.last=t}save();
 if(acc===100&&Q.queue.length>=5){milestone("⭐","PERFECT ROUND!","flawless 🔥");shakeScreen()}else if(met||acc>=80)confettiBurst(120);checkBadges();
 $.innerHTML=topbar()+`<div class="screen res"><div class="big">${acc>=80?'🤩':acc>=50?'😎':'💪'}</div><h2>${acc>=80?'absolutely ate 😤':acc>=50?'solid W':'we move 💪'}</h2><div class="muted">${Q.ok}/${Q.queue.length} correct${met?' · today’s words done 🎯':''}</div>${flexCardHTML(acc)}${wrongIds().length?`<button class="cta alt" onclick="startRedeem()">fix my ${wrongIds().length} weak words 🩹</button>`:''}<button class="cta ghost" onclick="home()">home</button></div>`}
function flexCardHTML(acc){return `<div class="flexcard"><div class="fl-lbl">flex card</div><div class="fl-big">${S.streak}-day streak 🔥</div><div class="fl-row"><div><span>lvl</span><b>${levelOf(S.xp)}</b></div><div><span>xp</span><b>${S.xp}</b></div><div><span>this run</span><b>${acc}%</b></div></div><div style="margin-top:13px;font-weight:900">vocab you can flex 💅</div></div><button class="cta ghost" onclick="shareFlex(${acc})">📲 share my flex</button>`}
function shareFlex(acc){const txt=`flexing my GRE vocab 💅\\n🔥 ${S.streak}-day streak\\n⚡ lvl ${levelOf(S.xp)} · ${S.xp} XP\\n🎯 ${acc}% this run\\n— on lexi`;try{if(navigator.share){navigator.share({text:txt.replace(/\\n/g,'\n')});return}}catch(e){}try{navigator.clipboard.writeText(txt.replace(/\\n/g,'\n'));toast("flex copied 📋")}catch(e){toast("screenshot & flex 📸")}}

/* ===== TRAP DRILLS ===== */
function startTrap(t){const ids=WORDS.filter(w=>w.tags&&w.tags.includes(t)).map(w=>w.id);if(ids.length<2){toast("more "+TAG[t].n+" coming soon ✨");return}toast(TAG[t].e+" "+TAG[t].n+" — "+TAG[t].desc);
 if(t==='imp')setTimeout(()=>startTwin(ids),350);else if(t==='da')setTimeout(()=>startContext(ids),350);else if(t==='vf')setTimeout(()=>startVibe(),350);else if(t==='sqd')setTimeout(()=>startSquad(ids),350)}
function trapEnd(name,ok,tot){const acc=tot?Math.round(100*ok/tot):0;if(acc>=80)milestone("🛡️",name+" cleared!","trap-proof 💪");else if(acc>=50)confettiBurst(50);$.innerHTML=topbar()+`<div class="screen res"><div class="big">${acc>=80?'🛡️':acc>=50?'😎':'💪'}</div><h2>${name} done</h2><div class="muted">${ok}/${tot} correct</div><div class="statrow"><div class="scard"><div class="v">${acc}%</div><div class="l">accuracy</div></div><div class="scard"><div class="v">${S.streak}</div><div class="l">streak</div></div><div class="scard"><div class="v">${S.xp}</div><div class="l">xp</div></div></div><button class="cta ghost" onclick="home()">home</button></div>`}
function trapGrade(w,correct,pts,tt){const st=cs(w.id);st.seen=true;S.totAns++;if(correct){st.ok++;st.box=Math.min(5,st.box+1);st.due=todayN()+INTERVAL[st.box];S.totOk++;if(w.tags&&w.tags.length)S.trapOk++;if(tt){S.trapWordOk=S.trapWordOk||{};S.trapWordOk[w.id]=true}addXP(pts);S.goalCount++;rollGoal();save();checkBadges();celebrate(2)}else{st.no++;st.box=1;st.due=todayN();addXP(2);S.goalCount++;rollGoal();save();sBad()}}
/* 🎭 Twin Tap */
let TT=null;function startTwin(ids){TT={q:shuffle(ids),i:0,ok:0};twin()}
function twin(){if(TT.i>=TT.q.length)return trapEnd('Twin Tap',TT.ok,TT.q.length);const w=word(TT.q[TT.i]),pair=shuffle([{t:w.w,ok:true},{t:w.twin.w,ok:false}]);$.innerHTML=topbar()+`<div class="screen"><div class="qtop"><button class="x" onclick="home()">✕</button><div class="pbar"><i style="width:${TT.i/TT.q.length*100}%"></i></div></div><div class="badges"><span class="bdg" style="color:${TAG.imp.c};border-color:${TAG.imp.c}66">🎭 Twin Tap</span></div><div class="card" style="--accent:${TAG.imp.c}"><div class="prompt">which twin means this?</div><div class="rdef" style="text-align:center;font-size:17px">${w.def}</div></div><div class="hbtns" style="margin-top:14px">${pair.map((p,i)=>`<button class="hbtn ${i===0?'real':'fake'}" onclick="twinPick(${p.ok})">${p.t}</button>`).join('')}</div><div id="rev"></div></div>`}
function twinPick(ok){const w=word(TT.q[TT.i]);document.querySelectorAll('.hbtn').forEach(b=>b.setAttribute('disabled',''));if(ok)TT.ok++;trapGrade(w,ok,18,'imp');document.getElementById('rev').innerHTML=`<div class="reveal ${ok?'good':'bad'}"><div class="vtag">${ok?'😎 told them apart':'😵 the classic trap'}</div><div class="twins"><div class="twinbox"><b style="color:var(--mint)">${w.w}</b>${w.def}</div><div class="twinbox"><b style="color:var(--coral)">${w.twin.w}</b>${w.twin.d}</div></div><button class="cta" style="margin-top:12px" onclick="TT.i++;twin()">${TT.i+1>=TT.q.length?'finish':'next'}</button></div>`}
/* 🕵️ Caught in Context */
let CC=null;function startContext(ids){CC={q:shuffle(ids),i:0,ok:0};ctxq()}
function ctxq(){if(CC.i>=CC.q.length)return trapEnd('Caught in Context',CC.ok,CC.q.length);const w=word(CC.q[CC.i]);const opts=shuffle([w.def,w.decoy,...pickN(WORDS.filter(x=>!(x.tags&&x.tags.includes('da'))).map(x=>x.def),2,[w.def])]);CC.ci=opts.indexOf(w.def);const sent=hlWord(w.sent,w.w,TAG.da.c);$.innerHTML=topbar()+`<div class="screen"><div class="qtop"><button class="x" onclick="home()">✕</button><div class="pbar"><i style="width:${CC.i/CC.q.length*100}%"></i></div></div><div class="badges"><span class="bdg" style="color:${TAG.da.c};border-color:${TAG.da.c}66">🕵️ Caught in Context</span></div><div class="blankq">${sent}</div><div class="prompt">what does it mean HERE?</div><div class="opts">${opts.map((t,i)=>`<button class="opt" id="o${i}" onclick="ctxPick(${i})"><span class="k">${'ABCD'[i]}</span><span>${t}</span></button>`).join('')}</div><div id="rev"></div></div>`}
function ctxPick(i){const w=word(CC.q[CC.i]),correct=i===CC.ci;document.querySelectorAll('.opt').forEach((el,idx)=>{el.setAttribute('disabled','');if(idx===CC.ci)el.classList.add('correct');else if(idx===i)el.classList.add('wrong','shake')});if(correct)CC.ok++;trapGrade(w,correct,18,'da');document.getElementById('rev').innerHTML=`<div class="reveal ${correct?'good':'bad'}"><div class="vtag">${correct?'😎 busted the agent':'😵 fell for the decoy'}</div><div class="rdef"><b>${w.w}</b> here = ${w.def}</div><div class="sent" style="margin-top:6px">🎭 the decoy meaning you knew: ${w.decoy}</div><button class="cta" style="margin-top:12px" onclick="CC.i++;ctxq()">${CC.i+1>=CC.q.length?'finish':'next'}</button></div>`}
/* 🌈 Squad Goals */
let SQ=null;function startSquad(ids){const pool=ids.map(word);SQ={pool,left:pool.map(w=>w.w),right:shuffle(pool.map(w=>w.def)),sel:null,done:0};squad()}
function squad(){const L=SQ.left.map((t,i)=>`<button class="mitem" id="L${i}" onclick="sqSel(${i})"><b>${t}</b></button>`).join(''),R=SQ.right.map((t,i)=>`<button class="mitem" id="R${i}" onclick="sqHit(${i})">${t}</button>`).join('');$.innerHTML=topbar()+`<div class="screen"><div class="qtop"><button class="x" onclick="home()">✕</button><div class="pbar"><i style="width:${SQ.done/SQ.pool.length*100}%"></i></div></div><div class="badges"><span class="bdg" style="color:${TAG.sqd.c};border-color:${TAG.sqd.c}66">🌈 Squad Goals</span></div><div class="prompt">same family, different shade — match each to its exact meaning</div><div class="mcols"><div class="mcol">${L}</div><div class="mcol">${R}</div></div></div>`}
function sqSel(i){if(document.getElementById('L'+i).classList.contains('done'))return;sTap();document.querySelectorAll('.mcol .mitem').forEach(e=>e.classList.remove('sel'));SQ.sel=i;document.getElementById('L'+i).classList.add('sel')}
function sqHit(j){if(SQ.sel===null||document.getElementById('R'+j).classList.contains('done'))return;const li=SQ.sel,lw=SQ.pool.find(w=>w.w===SQ.left[li]),correct=SQ.left[li]===SQ.pool.find(w=>w.def===SQ.right[j]).w;if(correct){document.getElementById('L'+li).classList.add('done');document.getElementById('R'+j).classList.add('done');SQ.done++;SQ.sel=null;trapGrade(lw,true,8,'sqd');if(SQ.done>=SQ.pool.length)setTimeout(()=>trapEnd('Squad Goals',SQ.done,SQ.pool.length),500)}else{const r=document.getElementById('R'+j);r.classList.add('bad');S.totAns++;sBad();save();setTimeout(()=>r.classList.remove('bad'),400)}}
/* 🎢 Vibe Check */
let VB=null;function startVibe(){const pool=shuffle(WORDS.filter(w=>w.vibe)).slice(0,10);VB={q:pool,i:0,ok:0};vibeq()}
function vibeq(){if(VB.i>=VB.q.length)return trapEnd('Vibe Check',VB.ok,VB.q.length);const w=VB.q[VB.i];$.innerHTML=topbar()+`<div class="screen"><div class="qtop"><button class="x" onclick="home()">✕</button><div class="pbar"><i style="width:${VB.i/VB.q.length*100}%"></i></div></div><div class="badges"><span class="bdg" style="color:${TAG.vf.c};border-color:${TAG.vf.c}66">🎢 Vibe Check</span></div><div class="prompt">good vibe or bad vibe? don't trust how it sounds</div><div class="stmt">${w.w}</div><div class="hbtns"><button class="hbtn real" onclick="vibePick('pos')">😍 good</button><button class="hbtn fake" onclick="vibePick('neg')">🤮 bad</button></div><div id="rev"></div></div>`}
function vibePick(v){const w=VB.q[VB.i],correct=v===w.vibe;document.querySelectorAll('.hbtn').forEach(b=>b.setAttribute('disabled',''));if(correct)VB.ok++;trapGrade(w,correct,12,'vf');const flip=w.tags&&w.tags.includes('vf');document.getElementById('rev').innerHTML=`<div class="reveal ${correct?'good':'bad'}"><div class="vtag">${correct?'😎 vibe checked':'😵 it fooled you'}</div><div class="rdef"><b>${w.w}</b> — ${w.def}</div>${flip?`<div class="sent" style="margin-top:6px">🎢 it SOUNDS positive, but it's a bad-vibe word — classic trap.</div>`:''}<button class="cta" style="margin-top:12px" onclick="VB.i++;vibeq()">${VB.i+1>=VB.q.length?'finish':'next'}</button></div>`}

/* ===== KEPT MODES: match · real-or-fake · survival ===== */
let M=null;function startMatch(){const pool=shuffle(WORDS).slice(0,4);M={pool,left:pool.map(w=>w.w),right:shuffle(pool.map(w=>w.def)),sel:null,done:0};match()}
function match(){const L=M.left.map((t,i)=>`<button class="mitem" id="L${i}" onclick="msel(${i})"><b>${t}</b></button>`).join(''),R=M.right.map((t,i)=>`<button class="mitem" id="R${i}" onclick="mhit(${i})">${t}</button>`).join('');$.innerHTML=topbar()+`<div class="screen"><div class="qtop"><button class="x" onclick="home()">✕</button><div class="pbar"><i style="width:${M.done/M.pool.length*100}%"></i></div></div><div class="badges"><span class="bdg" style="color:var(--sky);border-color:#4FB0FF66">🔗 match the word to its meaning</span></div><div class="mcols"><div class="mcol">${L}</div><div class="mcol">${R}</div></div></div>`}
function msel(i){if(document.getElementById('L'+i).classList.contains('done'))return;sTap();document.querySelectorAll('.mcol .mitem').forEach(e=>e.classList.remove('sel'));M.sel=i;document.getElementById('L'+i).classList.add('sel')}
function mhit(j){if(M.sel===null||document.getElementById('R'+j).classList.contains('done'))return;const li=M.sel,lw=M.pool.find(w=>w.w===M.left[li]),correct=M.left[li]===M.pool.find(w=>w.def===M.right[j]).w;if(correct){document.getElementById('L'+li).classList.add('done');document.getElementById('R'+j).classList.add('done');M.done++;M.sel=null;trapGrade(lw,true,8);if(M.done>=M.pool.length)setTimeout(()=>endMini('match-up',M.done,M.pool.length),500)}else{const r=document.getElementById('R'+j);r.classList.add('bad');S.totAns++;sBad();save();setTimeout(()=>r.classList.remove('bad'),400)}}
let F=null;function startFake(){const reals=shuffle(WORDS).slice(0,5).map(w=>({t:w.w,real:true,d:w.def})),fakes=shuffle(FAKES).slice(0,4).map(t=>({t,real:false}));F={q:shuffle([...reals,...fakes]),i:0,ok:0};fake()}
function fake(){if(F.i>=F.q.length)return endMini('real or fake',F.ok,F.q.length);const c=F.q[F.i];$.innerHTML=topbar()+`<div class="screen"><div class="qtop"><button class="x" onclick="home()">✕</button><div class="pbar"><i style="width:${F.i/F.q.length*100}%"></i></div></div><div class="badges"><span class="bdg" style="color:var(--coral);border-color:#FF6B8A66">🃏 real GRE word, or made-up?</span></div><div class="stmt">${c.t}</div><div class="hbtns"><button class="hbtn real" onclick="fpick(true)">✓ real</button><button class="hbtn fake" onclick="fpick(false)">🃏 fake</button></div><div id="rev"></div></div>`}
function fpick(v){const c=F.q[F.i],ok=v===c.real;S.totAns++;if(ok){F.ok++;S.totOk++;addXP(8);celebrate(2)}else sBad();S.goalCount++;rollGoal();save();document.querySelectorAll('.hbtn').forEach(b=>b.setAttribute('disabled',''));document.getElementById('rev').innerHTML=`<div class="reveal ${ok?'good':'bad'}"><div class="vtag">${ok?'😎 nailed it':'😵 gotcha'}</div><div class="rdef" style="margin-top:6px">${c.real?`<b>${c.t}</b> is real — ${c.d}`:`<b>${c.t}</b> is totally made up 😈`}</div><button class="cta" style="margin-top:12px" onclick="F.i++;fake()">${F.i+1>=F.q.length?'finish':'next'}</button></div>`}
let SV=null;function startSurvival(){SV={pool:shuffle(WORDS.map(w=>w.id)),i:0,score:0};surv()}
function surv(){if(SV.i>=SV.pool.length)return endMini('survival',SV.score,SV.score);const w=word(SV.pool[SV.i]);SV.cur=genQ(w,'define');$.innerHTML=topbar()+`<div class="screen"><div class="qtop"><button class="x" onclick="home()">✕</button><div class="pbar"><i style="width:100%;background:linear-gradient(90deg,var(--lav),var(--pink))"></i></div><div class="combo on" style="color:var(--lav)">💀 ${SV.score}</div></div><div class="badges">${badgeHTML(w)}</div><div class="card" style="--accent:${RANK[w.rank].c}"><div class="word">${w.w}</div><div class="pos">${w.pos}</div></div><div class="prompt">what's the vibe? · one wrong = over 💀</div><div class="opts">${SV.cur.opts.map((t,i)=>`<button class="opt" id="o${i}" onclick="svpick(${i})"><span class="k">${'ABCD'[i]}</span><span>${t}</span></button>`).join('')}</div></div>`}
function svpick(i){const w=word(SV.pool[SV.i]),ok=i===SV.cur.ci;document.querySelectorAll('.opt').forEach((el,idx)=>{el.setAttribute('disabled','');if(idx===SV.cur.ci)el.classList.add('correct');else if(idx===i)el.classList.add('wrong')});const st=cs(w.id);st.seen=true;S.totAns++;S.goalCount++;rollGoal();if(ok){st.ok++;st.box=Math.min(5,st.box+1);st.due=todayN()+INTERVAL[st.box];S.totOk++;SV.score++;addXP(8);save();celebrate(SV.score);setTimeout(()=>{SV.i++;surv()},600)}else{st.no++;st.box=1;st.due=todayN();save();sBad();setTimeout(()=>{$.innerHTML=topbar()+`<div class="screen res"><div class="big">${SV.score>=10?'🐐':SV.score>=5?'🔥':'💀'}</div><h2>survived ${SV.score}</h2><div class="muted">${SV.score>=10?'absolute goat':SV.score>=5?'respectable':'we go again'} 🔁</div><div class="reveal bad" style="text-align:left"><div class="vtag">😵 the word that got you</div><div class="rdef"><b>${w.w}</b> — ${w.def}</div>${w.hook?`<div class="hook"><span class="he">💡</span><div><b>trick:</b> ${w.hook}</div></div>`:''}</div><button class="cta" onclick="startSurvival()">run it back 🔁</button><button class="cta ghost" onclick="home()">home</button></div>`},850)}}
function endMini(name,ok,tot,extra){const acc=tot?Math.round(100*ok/tot):0;if(acc>=80)confettiBurst(110);$.innerHTML=topbar()+`<div class="screen res"><div class="big">${acc>=80?'🤩':acc>=50?'😎':'💪'}</div><h2>${name} done</h2><div class="muted">${ok}/${tot}${extra?' · '+extra:''}</div><div class="statrow"><div class="scard"><div class="v">${acc}%</div><div class="l">accuracy</div></div><div class="scard"><div class="v">${S.streak}</div><div class="l">streak</div></div><div class="scard"><div class="v">${S.xp}</div><div class="l">xp</div></div></div><button class="cta ghost" onclick="home()">home</button></div>`}

/* ===== STATS · SAVE · UPDATE ===== */
function stats(){const acc=S.totAns?Math.round(100*S.totOk/S.totAns):0,mastered=Object.values(S.cards).filter(c=>c.box>=5).length,learned=Object.values(S.cards).filter(c=>c.seen).length;const badges=Object.keys(BADGES).map(b=>{const g=S.badges.includes(b);return `<div class="tile ${g?'':'locked'}" style="cursor:default"><div class="ic">${BADGES[b].e}</div><div class="t">${BADGES[b].t}</div><div class="d">${BADGES[b].d}</div></div>`}).join('');let heat='';for(let d=13;d>=0;d--){const dt=new Date(Date.now()-d*DAYMS).toISOString().slice(0,10),h=S.hist[dt];let bg='#EFE6DA';if(h){const r=h.o/Math.max(1,h.a);bg=r>=.8?'#2FCB9B':r>=.5?'#9B82FF':'#FF6B8A'}heat+=`<i style="display:inline-block;width:15px;height:15px;border-radius:4px;background:${bg};margin:2px"></i>`}$.innerHTML=topbar()+`<div class="screen"><div class="qtop"><button class="x" onclick="home()">←</button><h3>your stats</h3></div>${flexCardHTML(acc)}<div class="statrow"><div class="scard"><div class="v">${learned}</div><div class="l">learned</div></div><div class="scard"><div class="v">${mastered}</div><div class="l">mastered</div></div><div class="scard"><div class="v">${S.best}</div><div class="l">best streak</div></div></div><div class="statrow"><div class="scard"><div class="v">${S.totOk}</div><div class="l">right</div></div><div class="scard"><div class="v">${S.totAns-S.totOk}</div><div class="l">wrong</div></div><div class="scard"><div class="v">${acc}%</div><div class="l">accuracy</div></div></div><div class="sect"><div class="ey">last 14 days</div><div style="margin-top:8px">${heat}</div></div><div class="sect"><div class="ey">badges</div><div class="grid2" style="margin-top:10px">${badges}</div></div><div class="sect"><button class="cta ghost" onclick="if(confirm('reset everything on this device?')){S=freshState();save();home()}">reset progress</button></div></div>`}
function saveApp(){try{const html='<!DOCTYPE html>\n'+document.documentElement.outerHTML;const blob=new Blob([html],{type:'text/html'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='lexi.html';document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),4000);toast('⬇ saved lexi.html — tap menu → Add to Home Screen')}catch(e){toast('browser menu → Add to Home Screen 📲')}}
function checkUpdate(){toast('🔄 fetching the latest…');setTimeout(()=>{try{location.replace(location.pathname+'?v='+Date.now())}catch(e){location.reload(true)}},400)}
async function loadDrops(){if(!DROPS_URL)return;try{const r=await fetch(DROPS_URL,{cache:'no-store'});if(!r.ok)return;const d=await r.json();let added=0;if(Array.isArray(d.words))d.words.forEach(w=>{if(w&&w.id&&!WORDS.find(x=>x.id===w.id)){WORDS.push(w);added++}});if(added){toast('📡 '+added+' fresh words dropped in');home()}}catch(e){}}
const SKINS=[
 {n:"Galaxy",bg:"#140E26",g:["rgba(155,130,255,.5)","rgba(255,127,176,.4)","rgba(79,176,255,.4)"]},
 {n:"Aurora",bg:"#07221E",g:["rgba(47,203,155,.5)","rgba(79,176,255,.4)","rgba(255,194,61,.35)"]},
 {n:"Sunset",bg:"#2A0E1E",g:["rgba(255,107,138,.5)","rgba(255,158,94,.45)","rgba(255,194,61,.35)"]},
 {n:"Neon",bg:"#0C0A1A",g:["rgba(255,127,176,.5)","rgba(79,176,255,.45)","rgba(47,203,155,.42)"]},
 {n:"Ocean",bg:"#08152E",g:["rgba(79,176,255,.5)","rgba(47,203,155,.4)","rgba(155,130,255,.4)"]},
 {n:"Berry",bg:"#23061E",g:["rgba(255,127,176,.5)","rgba(155,130,255,.45)","rgba(255,107,138,.42)"]}
];
function applySkin(){const s=SKINS[S.skin||0];document.body.style.background=s.bg;document.body.style.backgroundImage=`radial-gradient(70% 40% at 90% -5%,${s.g[0]} 0,transparent 50%),radial-gradient(60% 35% at 0% 3%,${s.g[1]} 0,transparent 50%),radial-gradient(80% 45% at 50% 108%,${s.g[2]} 0,transparent 55%)`;const m=document.querySelector('meta[name=theme-color]');if(m)m.content=s.bg}
function openSkins(){const cur=S.skin||0;const sw=SKINS.map((s,i)=>`<button onclick="setSkin(${i})" style="border:2.5px solid ${i===cur?'var(--lav)':'var(--line)'};border-radius:16px;padding:0;cursor:pointer;overflow:hidden;background:${s.bg}"><div style="height:50px;background-image:radial-gradient(70% 90% at 80% 5%,${s.g[0]},transparent),radial-gradient(70% 90% at 5% 30%,${s.g[1]},transparent),radial-gradient(80% 90% at 50% 110%,${s.g[2]},transparent)"></div><div style="font-size:12px;font-weight:800;padding:6px 4px;color:var(--ink)">${s.n}${i===cur?' ✓':''}</div></button>`).join('');const m=document.createElement('div');m.className='modal';m.onclick=e=>{if(e.target===m)m.remove()};m.innerHTML=`<div class="sheet"><h3>pick a skin 🎨</h3><div class="sub">vibrant dark themes — pick your vibe</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-top:6px">${sw}</div><button class="cta" style="margin-top:16px" onclick="this.closest('.modal').remove()">done ✨</button></div>`;document.body.appendChild(m)}
function setSkin(i){S.skin=i;save();applySkin();sTap();const m=document.querySelector('.modal');if(m)m.remove();openSkins()}
applySkin();home();loadDrops();

</script>
</body></html>
